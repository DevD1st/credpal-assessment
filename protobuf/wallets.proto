syntax = "proto3";

package wallets;

import "protobuf/common.proto";

service WalletsService {
  rpc CreateWallet(CreateWalletInput) returns (CreateWalletResponse);
  rpc GetWallets(GetWalletsInput) returns (GetWalletsResponse);
  rpc FundWallet(FundWalletInput) returns (FundWalletResponse);
  rpc CreateQuote(CreateQuoteInput) returns (CreateQuoteResponse);
  rpc TradeCurrency(TradeCurrencyInput) returns (TradeCurrencyResponse);
}

service FxService {
  rpc FetchExchangeRates(FetchExchangeRatesInput) returns (FetchExchangeRatesResponse);
}

service TransactionsService {
  rpc GetTransactions(GetTransactionsInput) returns (GetTransactionsResponse);
}

// ------------------------------------------
// Requests
// ------------------------------------------
message CreateWalletInput {
  string currency = 1;
}

message GetWalletsInput {
  optional string currency = 1;
  optional string status = 2;
  optional int32 offset = 3;
  optional int32 limit = 4;
}

message FundWalletInput {
  string wallet_id = 1;
  // expected to be in lowest currency unit
  int64 amount = 2;
  string idempotency_key = 3;
}

message CreateQuoteInput {
  string base_currency = 1;
  string target_currency = 2;
}

message TradeCurrencyInput {
  string quote_id = 1;
  string base_currency = 2;
  string target_currency = 3;
  int64 amount = 4;
}

message FetchExchangeRatesInput {
  string base_currency = 1;
}

message GetTransactionsInput {
  optional string currency = 1;
  optional string status = 2;
  optional int32 offset = 3;
  optional int32 limit = 4;
}

// ------------------------------------------
// Responses
// ------------------------------------------
message GetWalletsResponse {
  oneof response {
    Wallets data = 1;
    common.Error error = 2;
  }
}

message CreateWalletResponse {
  oneof response {
    Wallet data = 1;
    common.Error error = 2;
  }
}

message FundWalletResponse {
  oneof response {
    Wallet data = 1;
    common.Error error = 2;
  }
}

message Wallets {
  repeated Wallet wallets = 1;
  int32 total = 2;
}

message CreateQuoteResponse {
  oneof response {
    Quote data = 1;
    common.Error error = 2;
  }
}

message Quote {
  string id = 1;
  string base_currency = 2;
  string target_currency = 3;
  int64 amount = 4;
  string expires_at = 5;
}

message TradeCurrencyResponse {
  oneof response {
    Transaction data = 1;
    common.Error error = 2;
  }
}

message FetchExchangeRatesResponse {
  oneof response {
    ExchangeRates data = 1;
    common.Error error = 2;
  }
}

message ExchangeRates {
  repeated ExchangeRate exchange_rates = 1;
}

message ExchangeRate {
  string base_currency = 1;
  string target_currency = 2;
  int64 exchange_rate = 3;
  int64 exchange_rate_with_spread = 4;
  int32 percentage_spread = 5;
}

message GetTransactionsResponse {
  oneof response {
    Transactions data = 1;
    common.Error error = 2;
  }
}

message Transactions {
  repeated Transaction transactions = 1;
  int32 total = 2;
}

// ------------------------------------------
// Data Models
// ------------------------------------------
message Wallet {
  string id = 1;
  string user_id = 2;
  string currency = 3;
  int64 balance = 4;
  string status = 5;
  string created_at = 6;
  string updated_at = 7;
}

message Transaction {
  string id = 1;
  string user_id = 2;
  string base_wallet_id = 3;
  string target_wallet_id = 4;
  string type = 5;
  string base_currency = 6;
  string target_currency = 7;
  int64 base_amount = 8;
  int64 target_amount = 9;
  string status = 10;
  int64 exchange_rate = 11;
  int64 exchange_rate_with_spread = 12;
  int32 percentage_spread = 13;
  string reference = 14;
  string created_at = 15;
  string updated_at = 16;
}